# this workflow trigger conversion of dscheck.usg, if it is changed, into section*.rst in repository
# NCAR/gdex-docs-dscheck
#
on:
  pull_request:
    paths:
      - 'src/rda_python_dscheck/dscheck.usg'

jobs:
  trigger_conversion:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DSCHECK_USG }}
          repository: NCAR/gdex-docs-dscheck
          event-type: trigger-conversion
          client-payload: '{"branch":"${{ github.event.pull_request.head.ref }}"}'
          
